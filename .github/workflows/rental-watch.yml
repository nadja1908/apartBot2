name: rental-watch

on:
  push:
    branches:
      - main
  schedule:
    - cron: '7/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: rental-watch
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run rental_watch single check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}

          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python -c "import sys; from rental_watch import run_once; sys.exit(run_once())"

      - name: Record last run timestamp
        if: always()
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last_run.txt

      - name: Show state before commit
        if: always()
        run: |
          echo "=== state.json before commit ==="
          if [ -f state.json ]; then
            cat state.json
          else
            echo "state.json ne postoji"
          fi

      - name: Commit and push state
        if: always()
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -f last_run.txt

          if [ -f state.json ]; then
            git add -f state.json
          fi

          if [ -f last_state.json ]; then
            git add -f last_state.json
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update rental watch state [skip ci]"

          for i in 1 2 3; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push; then
              echo "State pushed successfully"
              exit 0
            fi

            echo "Push failed, retrying..."
            sleep 5
          done

          echo "Push failed after 3 attempts"
          exit 1