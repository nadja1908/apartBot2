name: rental-watch

on:
  push:
    branches:
      - main
  schedule:
    - cron: '7/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: rental-watch
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Test Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python rental_watch.py --test-telegram

      - name: Run rental_watch single check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python -c "import sys; from rental_watch import run_once; sys.exit(run_once())"

      - name: Record last run timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last_run.txt

      - name: Show state after run
        if: always()
        run: |
          echo "=== state.json ==="
          cat state.json || echo "state.json ne postoji"

      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -f last_run.txt

          if [ -f state.json ]; then
            git add -f state.json
          fi

          if [ -f last_state.json ]; then
            git add -f last_state.json
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update rental watch state [skip ci]"
            git push
          fi