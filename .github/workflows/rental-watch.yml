name: rental-watch

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Playwright (optional)
        run: |
          python -m pip install playwright || true
          python -m playwright install chromium || true

      - name: Run rental_watch (single run)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          WATCH_INTERVAL_SECONDS: "300"
        run: |
          set -e
          python -c "import sys; from rental_watch import run_once; sys.exit(run_once())"

      - name: Record last run timestamp
        run: |
          # Write UTC timestamp so we can verify scheduled runs happened
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last_run.txt || python - <<'PY'
from datetime import datetime
print(datetime.utcnow().isoformat() + 'Z')
PY
          git add last_run.txt
          git commit -m "ci: update last_run timestamp" || echo "no changes to commit"
          if [ -n "$PUSH_TOKEN" ]; then
            git remote set-url origin https://x-access-token:${GITHUB_PUSH_TOKEN}@github.com/$GITHUB_REPOSITORY
          fi
          git push || echo "git push failed"

      - name: Commit state.json if changed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add state.json last_state.json || true
            git commit -m "ci: update state.json (rental-watch)" || echo "no changes to commit"
            if [ -n "$PUSH_TOKEN" ]; then
              git remote set-url origin https://x-access-token:${PUSH_TOKEN}@github.com/$GITHUB_REPOSITORY
            fi
            git push || echo "git push failed"
          else
            echo "no changes"
          fi
