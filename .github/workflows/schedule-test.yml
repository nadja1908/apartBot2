name: schedule-test

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Write heartbeat timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > heartbeat.txt || python - <<'PY'
          from datetime import datetime
          print(datetime.utcnow().isoformat() + 'Z')
          PY

      - name: Upload heartbeat
        uses: actions/upload-artifact@v4
        with:
          name: heartbeat
          path: heartbeat.txt
